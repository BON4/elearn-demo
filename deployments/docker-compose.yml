version: "3.9"

services:
  courses-service:
      build:
        context: ../
        dockerfile: Dockerfile.courcesrv
      container_name: courses-service
      ports:
        - "8080:8080"
      depends_on:
        postgres:
          condition: service_healthy
        rabbitmq:
          condition: service_started
      environment:
        DATABASE_URL: postgres://postgres:postgres@postgres:5432/courses?sslmode=disable
        REBBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      networks:
        - backend

  postgres:
    image: postgres:16-alpine
    container_name: courses-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: courses
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5      
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: courses-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # UI
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge